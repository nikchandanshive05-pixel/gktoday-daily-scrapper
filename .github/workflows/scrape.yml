STREAMING_CHUNK:Configuring workflow triggers...

name: GKToday Daily Scraper

on:
schedule:
# Runs at 00:30 UTC every day, which translates exactly to 6:00 AM IST.
- cron: '30 0 * * *'

Adds a "Run workflow" button in the GitHub UI so you can trigger it manually anytime.

workflow_dispatch:

STREAMING_CHUNK:Setting up the virtual server environment...

jobs:
scrape-and-deliver:
runs-on: ubuntu-latest # Allocates a free, temporary Linux server

steps:
  # STREAMING_CHUNK:Downloading repository files...
  - name: Checkout Repository
    uses: actions/checkout@v4

  # STREAMING_CHUNK:Installing Python runtime...
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  # STREAMING_CHUNK:Installing dependencies...
  - name: Install Required Libraries
    run: |
      python -m pip install --upgrade pip
      pip install requests beautifulsoup4 reportlab

  # STREAMING_CHUNK:Executing the scraper with secure credentials...
  - name: Execute Scraper Script
    # Safely injects your GitHub Secrets into the server environment
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    run: |
      # Make sure this matches the exact name of your Python file in the repository
      python gktoday_final_scraper.py
