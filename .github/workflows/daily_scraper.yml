name: GKToday Daily Scraper

# Define when the workflow should run
on:
  schedule:
    # GitHub Actions servers use UTC (Coordinated Universal Time).
    # IST is UTC + 5:30. To run at 6:00 AM IST, we set the cron to 00:30 UTC.
    # Format: minute hour day month day-of-week
    - cron: '30 0 * * *' 
  workflow_dispatch: # This line adds a "Run workflow" button in the GitHub UI for manual testing

jobs:
  scrape-and-deliver:
    runs-on: ubuntu-latest # Allocates a temporary Linux server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        # This step downloads your python script from your repository onto the temporary server

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 reportlab

      - name: Execute Scraper Script
        # We pass the secrets securely as Environment Variables
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python gktoday_scraper_v7.py
