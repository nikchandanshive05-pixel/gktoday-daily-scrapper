name: Daily GKToday Scraper

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:       # Manual trigger button

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests lxml reportlab Pillow
    
    - name: Run scraper
      run: |
        python gktoday_scraper.py --daily --output output
    
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v3
      with:
        name: gktoday-pdf-${{ github.run_date }}
        path: output/pdfs/*.pdf
    
    - name: Commit results to repo
      run: |
        git config --local user.email "bot@github.com"
        git config --local user.name "GitHub Bot"
        git add output/
        git diff --quiet && git diff --staged --quiet || git commit -m "Daily digest: $(date +%Y-%m-%d)"
        git push
