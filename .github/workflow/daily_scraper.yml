name: Daily GKToday Scraper + Telegram Delivery

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:       # Manual trigger button

jobs:
  scrape-and-deliver:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install Python packages
    - name: Install Python dependencies
      run: |
        pip install beautifulsoup4==4.12.3
        pip install requests==2.31.0
        pip install lxml==5.1.0
        pip install reportlab==4.0.9
        pip install Pillow==10.2.0

    # Step 4: Create output directories
    - name: Create output directories
      run: |
        mkdir -p output/json
        mkdir -p output/pdfs

    # Step 5: Run the scraper
    - name: Scrape GKToday and generate PDF
      run: |
        python gktoday_scraper.py --daily --output output
      continue-on-error: true

    # Step 6: Check if PDF was generated
    - name: Check PDF output
      id: check_pdf
      run: |
        PDF_FILE=$(ls -t output/pdfs/*.pdf 2>/dev/null | head -1)
        if [ -n "$PDF_FILE" ]; then
          echo "pdf_found=true" >> $GITHUB_OUTPUT
          echo "pdf_path=$PDF_FILE" >> $GITHUB_OUTPUT
          echo "pdf_name=$(basename $PDF_FILE)" >> $GITHUB_OUTPUT
          echo "✅ PDF found: $PDF_FILE"
        else
          echo "pdf_found=false" >> $GITHUB_OUTPUT
          echo "❌ No PDF generated"
        fi

    # Step 7: Send PDF to Telegram (if generated)
    - name: Send PDF to Telegram
      if: steps.check_pdf.outputs.pdf_found == 'true'
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PDF_PATH: ${{ steps.check_pdf.outputs.pdf_path }}
        PDF_NAME: ${{ steps.check_pdf.outputs.pdf_name }}
      run: |
        echo "📤 Sending PDF to Telegram..."

        # Send notification message
        curl -s -X POST           "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"           -d "chat_id=${CHAT_ID}"           -d "parse_mode=HTML"           -d "text=📰 <b>GKToday Daily Digest</b>%0A%0A📅 Date: $(date +%Y-%m-%d)%0A📄 PDF: ${PDF_NAME}%0A%0A✅ Generated successfully from GKToday.in"           > /dev/null

        # Send the PDF document
        curl -s -X POST           "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"           -F "chat_id=${CHAT_ID}"           -F "document=@${PDF_PATH}"           -F "caption=📰 GKToday Daily Digest - $(date +%Y-%m-%d)"           -F "parse_mode=HTML"           > /dev/null

        echo "✅ PDF sent to Telegram successfully!"

    # Step 8: Send failure notification (if PDF not generated)
    - name: Send failure notification
      if: steps.check_pdf.outputs.pdf_found == 'false'
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST           "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"           -d "chat_id=${CHAT_ID}"           -d "parse_mode=HTML"           -d "text=⚠️ <b>GKToday Scraper Alert</b>%0A%0A❌ PDF generation failed for $(date +%Y-%m-%d)%0A%0A🔧 Check GitHub Actions logs for details:%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"           > /dev/null

        echo "⚠️ Failure notification sent to Telegram"

    # Step 9: Upload PDF as GitHub artifact
    - name: Upload PDF artifact
      if: steps.check_pdf.outputs.pdf_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: gktoday-pdf-${{ github.run_date }}
        path: output/pdfs/*.pdf
        retention-days: 30

    # Step 10: Commit results to repository
    - name: Commit and push results
      run: |
        git config --local user.email "bot@github.com"
        git config --local user.name "GitHub Actions Bot"

        git add output/

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "📰 GKToday Daily Digest: $(date +%Y-%m-%d) [Run ${{ github.run_number }}]"
          git push
          echo "✅ Results committed to repository"
        fi
      continue-on-error: true

    # Step 11: Upload JSON data as artifact
    - name: Upload JSON artifact
      uses: actions/upload-artifact@v4
      with:
        name: gktoday-json-${{ github.run_date }}
        path: output/json/*.json
        retention-days: 90
